<!DOCTYPE html>
<html class="light" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>LENS & LIGHT - Đăng nhập</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="js/tailwind.config.js"></script>
    <link href="css/style.css" rel="stylesheet" />
</head>
<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex flex-col selection:bg-primary selection:text-on-primary">
    
    <!-- Mũi tên quay lại nhanh -->
    <a href="trangchu.html" class="absolute top-8 left-8 flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors font-label-caps tracking-widest text-[12px] uppercase">
        <span class="material-symbols-outlined text-[18px]">arrow_back</span>
        Quay lại trang chủ
    </a>

    <div class="flex-grow flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-surface-container-lowest p-10 rounded-2xl shadow-xl border border-outline-variant/30">
            <!-- Header -->
            <div class="text-center mb-10">
                <span class="material-symbols-outlined text-primary text-5xl mb-4">camera</span>
                <h1 class="font-display-lg text-3xl tracking-tight text-on-background uppercase">LENS & LIGHT</h1>
                <p class="font-body-md text-on-surface-variant mt-2 text-sm">Đăng nhập để quản lý đơn hàng và lưu yêu thích.</p>
            </div>

            <!-- Tabs -->
            <div class="flex border-b border-outline-variant/50 mb-8">
                <button id="tabLogin" class="flex-1 pb-3 text-sm font-label-caps tracking-widest uppercase border-b-2 border-primary text-primary transition-colors">Đăng nhập</button>
                <button id="tabRegister" class="flex-1 pb-3 text-sm font-label-caps tracking-widest uppercase border-b-2 border-transparent text-on-surface-variant hover:text-on-surface transition-colors">Đăng ký</button>
            </div>

            <!-- Form Đăng nhập -->
            <form id="loginForm" class="flex flex-col gap-5">
                <div>
                    <label class="block font-label-caps text-[11px] tracking-widest text-on-surface-variant uppercase mb-2">Tên đăng nhập</label>
                    <input type="text" id="loginUsername" required placeholder="admin hoặc user" class="w-full bg-surface-container-low/50 border border-outline-variant/30 focus:border-primary focus:bg-white rounded-xl py-3 px-4 text-sm outline-none transition-all">
                </div>
                <div>
                    <label class="block font-label-caps text-[11px] tracking-widest text-on-surface-variant uppercase mb-2">Mật khẩu</label>
                    <input type="password" id="loginPassword" required placeholder="Nhập 123" class="w-full bg-surface-container-low/50 border border-outline-variant/30 focus:border-primary focus:bg-white rounded-xl py-3 px-4 text-sm outline-none transition-all">
                </div>
                <button type="submit" class="mt-4 w-full bg-primary text-on-primary font-label-caps text-[12px] py-4 rounded-xl tracking-widest uppercase hover:bg-inverse-surface transition-all shadow-md">ĐĂNG NHẬP</button>
            </form>

            <!-- Form Đăng ký -->
            <form id="registerForm" class="flex flex-col gap-5 hidden">
                <div>
                    <label class="block font-label-caps text-[11px] tracking-widest text-on-surface-variant uppercase mb-2">Họ và tên</label>
                    <input type="text" id="regFullname" required placeholder="Nguyễn Văn A" class="w-full bg-surface-container-low/50 border border-outline-variant/30 focus:border-primary focus:bg-white rounded-xl py-3 px-4 text-sm outline-none transition-all">
                </div>
                <div>
                    <label class="block font-label-caps text-[11px] tracking-widest text-on-surface-variant uppercase mb-2">Tên đăng nhập</label>
                    <input type="text" id="regUsername" required placeholder="Nhập tên đăng nhập viết liền" class="w-full bg-surface-container-low/50 border border-outline-variant/30 focus:border-primary focus:bg-white rounded-xl py-3 px-4 text-sm outline-none transition-all">
                </div>
                <div>
                    <label class="block font-label-caps text-[11px] tracking-widest text-on-surface-variant uppercase mb-2">Mật khẩu</label>
                    <input type="password" id="regPassword" required placeholder="Tạo mật khẩu" class="w-full bg-surface-container-low/50 border border-outline-variant/30 focus:border-primary focus:bg-white rounded-xl py-3 px-4 text-sm outline-none transition-all">
                </div>
                <button type="submit" class="mt-4 w-full bg-inverse-surface text-on-primary font-label-caps text-[12px] py-4 rounded-xl tracking-widest uppercase hover:bg-primary transition-all shadow-md">TẠO TÀI KHOẢN</button>
            </form>
            
            <!-- Thông báo Lỗi -->
            <div id="authError" class="mt-4 text-center text-error text-sm hidden font-medium">
                Sai tên đăng nhập hoặc mật khẩu!
            </div>
        </div>
    </div>

    <!-- Script xử lý -->
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const authError = document.getElementById('authError');

            // Chuyển tab
            tabLogin.onclick = () => {
                tabLogin.classList.replace('border-transparent', 'border-primary');
                tabLogin.classList.replace('text-on-surface-variant', 'text-primary');
                tabRegister.classList.replace('border-primary', 'border-transparent');
                tabRegister.classList.replace('text-primary', 'text-on-surface-variant');
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                authError.classList.add('hidden');
            };

            tabRegister.onclick = () => {
                tabRegister.classList.replace('border-transparent', 'border-primary');
                tabRegister.classList.replace('text-on-surface-variant', 'text-primary');
                tabLogin.classList.replace('border-primary', 'border-transparent');
                tabLogin.classList.replace('text-primary', 'text-on-surface-variant');
                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
                authError.classList.add('hidden');
            };

            // Submit Login
            loginForm.onsubmit = (e) => {
                e.preventDefault();
                const u = document.getElementById('loginUsername').value.trim();
                const p = document.getElementById('loginPassword').value.trim();
                if (login(u, p)) {
                    const user = getCurrentUser();
                    if (user && user.role === 'admin') {
                        // Chuyển sang trang admin nếu là admin
                        window.location.href = 'admin.html';
                    } else {
                        // Chuyển về trang chủ nếu là user thường
                        window.location.href = 'trangchu.html';
                    }
                } else {
                    authError.innerText = "Sai tên đăng nhập hoặc mật khẩu!";
                    authError.classList.remove('hidden');
                }
            };

            // Submit Register
            registerForm.onsubmit = (e) => {
                e.preventDefault();
                const fn = document.getElementById('regFullname').value;
                const u = document.getElementById('regUsername').value;
                const p = document.getElementById('regPassword').value;
                if (register(fn, u, p)) {
                    window.location.href = 'trangchu.html';
                } else {
                    authError.innerText = "Tên đăng nhập đã tồn tại!";
                    authError.classList.remove('hidden');
                }
            };
            
            // Nếu đã login rồi mà mò vào đây thì đá ra
            if (getCurrentUser()) {
                window.location.href = 'trangchu.html';
            }
        });
    </script>
</body>
</html>
